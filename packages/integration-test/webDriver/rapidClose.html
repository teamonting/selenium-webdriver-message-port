<!doctype html>
<html lang="en">
  <head></head>
  <body>
    <script type="importmap">
      {
        "imports": {
          "@onting/selenium-webdriver-message-port": "/static/js/browser.js",
          "@onting/selenium-webdriver-message-port/": "/static/js/"
        }
      }
    </script>
    <script type="module">
      const worker = new Worker('./rapidClose.worker.js');

      import { messagePort } from '@onting/selenium-webdriver-message-port';

      messagePort.addEventListener('message', ({ data }) => worker.terminate(), { once: true });

      messagePort.start();
    </script>
  </body>
</html>
