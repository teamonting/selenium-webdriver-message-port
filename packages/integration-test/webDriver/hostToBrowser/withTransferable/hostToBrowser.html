<!doctype html>
<html lang="en">
  <head></head>
  <body>
    <script src="/static/js/browser.js" type="module"></script>
    <script type="module">
      navigator.webdriverMessagePort.addEventListener(
        'message',
        ({ data, ports }) => {
          console.log(data);

          ports[0].addEventListener('message', ({ data }) => console.log(data), { once: true });
          ports[0].start();
        },
        { once: true }
      );
      navigator.webdriverMessagePort.start();
    </script>
  </body>
