<!doctype html>
<html lang="en">
  <head></head>
  <body>
    <script type="importmap">
      {
        "imports": {
          "@onting/selenium-webdriver-message-port": "/static/js/browser.js",
          "@onting/selenium-webdriver-message-port/": "/static/js/"
        }
      }
    </script>
    <script type="module">
      import { messagePort } from '@onting/selenium-webdriver-message-port';

      messagePort.addEventListener(
        'message',
        ({ data, ports }) => {
          console.log(data);

          ports[0].postMessage('Aloha!');
        },
        { once: true }
      );

      messagePort.start();
    </script>
  </body>
</html>
