<!doctype html>
<html lang="en">
  <head></head>
  <body>
    <script type="importmap">
      {
        "imports": {
          "@onting/selenium-webdriver-message-port": "/static/js/browser.js",
          "@onting/selenium-webdriver-message-port/": "/static/js/"
        }
      }
    </script>
    <script type="module">
      import { messagePort } from '@onting/selenium-webdriver-message-port';

      const { port1, port2 } = new MessageChannel();

      port1.addEventListener('message', ({ data }) => console.log(data), { once: true });
      port1.start();

      messagePort.postMessage('Hello, World!', [port2]);
    </script>
  </body>
</html>
