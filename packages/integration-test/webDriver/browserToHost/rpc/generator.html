<!doctype html>
<html lang="en">
  <head></head>
  <body>
    <script src="/static/js/selenium-webdriver-message-port.browser.js" type="module"></script>
    <script type="module">
      import { forGenerator } from 'https://esm.sh/message-port-rpc';

      forGenerator(navigator.webdriverMessagePort, function* (value) {
        const result = yield 10;

        return result * 100;
      });
    </script>
  </body>
</html>
